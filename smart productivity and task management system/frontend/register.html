<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartTask</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px; font-size: 2rem;">Create Account</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Join thousands of productive users today.</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Pick a username" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign Up</button>
            </form>
            
            <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
