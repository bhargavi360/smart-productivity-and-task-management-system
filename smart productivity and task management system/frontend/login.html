<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartTask</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px; font-size: 2rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Sign in to continue to your dashboard.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            
            <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Register</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
